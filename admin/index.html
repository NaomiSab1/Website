<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sabdia CMS</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<script src="js/admin-core.js"></script>
<script src="js/admin-shell.js"></script>
<script>
(function () {
  const content = AdminShell.mount('dashboard', {
    title: 'Dashboard',
    crumbs: ['Admin', 'Dashboard']
  });
  if (!content) return;

  const data = CMS.load();
  const session = CMS.currentSession();
  const published = data.pages.filter(p => p.status === 'published').length;
  const drafts    = data.pages.filter(p => p.status === 'draft' || p.draftSections).length;
  const archived  = data.pages.filter(p => p.status === 'archived').length;
  const mediaCount = data.media.length;

  const ICONS = {
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>',
    add:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 5v14M5 12h14"/></svg>',
    pub:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 12l5 5L20 7"/></svg>',
    img:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 18l5-5 4 4 3-3 6 6"/></svg>',
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>',
    rest: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>'
  };
  const iconFor = (type) => ({
    edit: ICONS.edit, create: ICONS.add, publish: ICONS.pub,
    media: ICONS.img, login: ICONS.user, restore: ICONS.rest
  }[type] || ICONS.edit);

  content.innerHTML = `
    <div class="dash-grid">
      <div class="stat-card">
        <div class="stat-label">Published Pages</div>
        <div class="stat-value">${published}</div>
        <div class="stat-delta ok">Live on site</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pages with Drafts</div>
        <div class="stat-value">${drafts}</div>
        <div class="stat-delta ${drafts ? 'warn' : ''}">${drafts ? 'Unpublished changes' : 'All up to date'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Archived</div>
        <div class="stat-value">${archived}</div>
        <div class="stat-delta">Hidden from site</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Media Items</div>
        <div class="stat-value">${mediaCount}</div>
        <div class="stat-delta">In media library</div>
      </div>
    </div>

    <div class="dash-cols">
      <div class="panel">
        <div class="panel-head">
          <h3 class="panel-title">Recent activity</h3>
          <a href="history.html" class="small">View all</a>
        </div>
        <div class="panel-body" id="activityList"></div>
      </div>

      <div class="panel">
        <div class="panel-head"><h3 class="panel-title">Quick actions</h3></div>
        <div class="panel-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <a href="pages.html" class="btn">Manage Pages</a>
            <a href="media.html" class="btn">Media Library</a>
            <a href="globals.html" class="btn">Edit Globals</a>
            <a href="history.html" class="btn">Version History</a>
            ${CMS.can('users.view') ? '<a href="users.html" class="btn">Users &amp; Roles</a>' : ''}
            ${CMS.can('export') ? '<button class="btn" id="qExport">Export Data</button>' : ''}
          </div>
          <div class="divider"></div>
          <div class="small muted">Signed in as <strong>${CMS.escape(session.name)}</strong> (${CMS.escape(session.role)})</div>
        </div>
      </div>
    </div>
  `;

  // Activity feed
  const list = document.getElementById('activityList');
  const activity = (data.activity || []).slice(0, 8);
  if (!activity.length) {
    list.innerHTML = '<div class="empty-state"><h3>No activity yet</h3><p>Edits and publishes will appear here.</p></div>';
  } else {
    list.innerHTML = '<ul class="activity-list">' + activity.map(a => `
      <li class="activity-item">
        <div class="activity-icon">${iconFor(a.type)}</div>
        <div class="activity-body">
          <div class="activity-text">${CMS.escape(a.message)}</div>
          <div class="activity-meta">${CMS.escape(a.user)} · ${CMS.relTime(a.timestamp)}</div>
        </div>
      </li>`).join('') + '</ul>';
  }

  const exportBtn = document.getElementById('qExport');
  exportBtn && exportBtn.addEventListener('click', () => { CMS.exportJSON(); CMS.toast('Export downloaded', 'ok'); });
})();
</script>
</body>
</html>
