<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Library — Sabdia CMS</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<script src="js/admin-core.js"></script>
<script src="js/admin-shell.js"></script>
<script>
(function () {
  const urlBtn = AdminShell.button('Add from URL', { onClick: addByURL });
  if (!CMS.can('media.upload')) urlBtn.style.display = 'none';

  const content = AdminShell.mount('media', {
    title: 'Media Library',
    crumbs: ['Admin', 'Media'],
    actions: [urlBtn]
  });
  if (!content) return;

  let query = '';

  function render() {
    const data = CMS.load();
    content.innerHTML = `
      ${CMS.can('media.upload') ? `
      <div class="dropzone" id="dz">
        <div class="dropzone-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
        <div><strong>Drop images here</strong> or click to browse</div>
        <div class="small muted" style="margin-top:6px">JPG, PNG, WEBP, SVG · stored locally (max ~5MB per file)</div>
        <input type="file" id="dzInput" accept="image/*" multiple style="display:none">
      </div>` : ''}
      <div class="toolbar">
        <input class="input" id="q" placeholder="Search media by name…">
        <div class="toolbar-spacer"></div>
        <span class="small muted">${data.media.length} item${data.media.length === 1 ? '' : 's'}</span>
      </div>
      <div class="media-grid" id="grid"></div>
    `;

    const grid = document.getElementById('grid');
    const list = data.media.filter(m => !query || (m.name || '').toLowerCase().includes(query.toLowerCase()));

    if (!list.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>No media yet</h3><p>Upload images or add by URL to build your library.</p></div>';
    } else {
      grid.innerHTML = list.map(m => `
        <div class="media-tile" data-id="${m.id}">
          <div class="media-thumb"><img src="${CMS.escape(m.url)}" alt="${CMS.escape(m.alt || '')}"></div>
          <div class="media-meta">
            <div class="media-name">${CMS.escape(m.name)}</div>
            <div class="media-sub">${m.size ? Math.round(m.size/1024) + ' KB' : 'External'} · ${CMS.relTime(m.uploadedAt)}</div>
          </div>
          <div class="media-actions">
            <button data-act="edit" title="Edit">✎</button>
            <button data-act="copy" title="Copy URL">⧉</button>
            ${CMS.can('media.delete') ? '<button data-act="del" title="Delete">✕</button>' : ''}
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.media-tile').forEach(tile => {
        const id = tile.dataset.id;
        tile.querySelector('[data-act="edit"]').addEventListener('click', e => { e.stopPropagation(); editItem(id); });
        tile.querySelector('[data-act="copy"]').addEventListener('click', e => {
          e.stopPropagation();
          const item = CMS.load().media.find(x => x.id === id);
          navigator.clipboard.writeText(item.url).then(() => CMS.toast('URL copied', 'ok'));
        });
        const del = tile.querySelector('[data-act="del"]');
        if (del) del.addEventListener('click', e => { e.stopPropagation(); deleteItem(id); });
        tile.addEventListener('click', () => editItem(id));
      });
    }

    document.getElementById('q').addEventListener('input', e => { query = e.target.value; render(); });

    const dz = document.getElementById('dz');
    if (dz) {
      const input = document.getElementById('dzInput');
      dz.addEventListener('click', () => input.click());
      input.addEventListener('change', e => handleFiles(e.target.files));
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('over'));
      dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });
    }
  }

  function handleFiles(files) {
    if (!CMS.gate('media.upload')) return;
    const data = CMS.load();
    let pending = files.length;
    if (!pending) return;
    [...files].forEach(file => {
      if (!file.type.startsWith('image/')) { pending--; return; }
      const reader = new FileReader();
      reader.onload = e => {
        data.media.unshift({
          id: 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
          name: file.name,
          url: e.target.result,
          type: file.type,
          size: file.size,
          alt: '',
          uploadedAt: Date.now()
        });
        if (--pending === 0) {
          CMS.save(data);
          CMS.logActivity('media', `Uploaded ${files.length} image${files.length === 1 ? '' : 's'}`);
          CMS.toast(`Uploaded ${files.length} image${files.length === 1 ? '' : 's'}`, 'ok');
          render();
        }
      };
      reader.readAsDataURL(file);
    });
  }

  function addByURL() {
    if (!CMS.gate('media.upload')) return;
    const body = CMS.el(`<div>
      <div class="field"><label class="label">Image URL</label><input class="input" id="u-url" placeholder="https://…"></div>
      <div class="field"><label class="label">Name</label><input class="input" id="u-name" placeholder="Optional display name"></div>
      <div class="field"><label class="label">Alt text</label><input class="input" id="u-alt" placeholder="For accessibility &amp; SEO"></div>
    </div>`);
    CMS.modal({
      title: 'Add image by URL', body,
      confirmLabel: 'Add image',
      onConfirm: () => {
        const url = body.querySelector('#u-url').value.trim();
        if (!url) { CMS.toast('URL required', 'err'); return false; }
        const data = CMS.load();
        data.media.unshift({
          id: 'm_' + Date.now().toString(36),
          name: body.querySelector('#u-name').value.trim() || url.split('/').pop(),
          url, type: 'image/url', size: 0,
          alt: body.querySelector('#u-alt').value.trim(),
          uploadedAt: Date.now()
        });
        CMS.save(data);
        CMS.logActivity('media', `Added external image`);
        CMS.toast('Image added', 'ok');
        render();
      }
    });
  }

  function editItem(id) {
    const data = CMS.load();
    const m = data.media.find(x => x.id === id);
    if (!m) return;
    const body = CMS.el(`<div>
      <div style="text-align:center;margin-bottom:16px"><img src="${CMS.escape(m.url)}" style="max-height:240px;max-width:100%;border-radius:4px"></div>
      <div class="field"><label class="label">Name</label><input class="input" id="m-name" value="${CMS.escape(m.name)}" ${CMS.can('media.upload') ? '' : 'readonly'}></div>
      <div class="field"><label class="label">Alt text</label><input class="input" id="m-alt" value="${CMS.escape(m.alt || '')}" ${CMS.can('media.upload') ? '' : 'readonly'}></div>
      <div class="field"><label class="label">URL</label><input class="input mono" value="${CMS.escape(m.url)}" readonly></div>
      <div class="small muted">Uploaded ${new Date(m.uploadedAt).toLocaleString()}${m.size ? ' · ' + Math.round(m.size/1024) + ' KB' : ''}</div>
    </div>`);
    CMS.modal({
      title: 'Image details', body,
      confirmLabel: CMS.can('media.upload') ? 'Save' : 'Close',
      onConfirm: () => {
        if (!CMS.can('media.upload')) return true;
        m.name = body.querySelector('#m-name').value;
        m.alt = body.querySelector('#m-alt').value;
        CMS.save(data);
        CMS.toast('Saved', 'ok');
        render();
      }
    });
  }

  function deleteItem(id) {
    if (!CMS.gate('media.delete')) return;
    CMS.confirmDialog('Delete this image from the library? Pages using it will keep the URL reference.', () => {
      const data = CMS.load();
      data.media = data.media.filter(x => x.id !== id);
      CMS.save(data);
      CMS.logActivity('media', `Deleted media item`);
      CMS.toast('Image deleted', 'ok');
      render();
    });
  }

  render();
})();
</script>
</body>
</html>
