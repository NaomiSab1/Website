<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version History — Sabdia CMS</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<script src="js/admin-core.js"></script>
<script src="js/admin-shell.js"></script>
<script>
(function () {
  const content = AdminShell.mount('history', {
    title: 'Version History',
    crumbs: ['Admin', 'History']
  });
  if (!content) return;

  const params = new URLSearchParams(location.search);
  const filterPageId = params.get('page') || 'all';

  function render() {
    const data = CMS.load();
    const versions = (data.versions || []).filter(v => filterPageId === 'all' || v.pageId === filterPageId);

    content.innerHTML = `
      <div class="toolbar">
        <select class="select" id="pf" style="width:auto">
          <option value="all">All pages</option>
          ${data.pages.map(p => `<option value="${p.id}" ${filterPageId === p.id ? 'selected' : ''}>${CMS.escape(p.title)}</option>`).join('')}
        </select>
        <div class="toolbar-spacer"></div>
        <span class="small muted">${versions.length} snapshot${versions.length === 1 ? '' : 's'}</span>
      </div>
      <div class="panel" id="vp">
        ${versions.length ? '' : '<div class="empty-state"><h3>No snapshots yet</h3><p>Snapshots are taken automatically when you publish or restore.</p></div>'}
      </div>
    `;

    document.getElementById('pf').addEventListener('change', e => {
      const v = e.target.value;
      const url = v === 'all' ? 'history.html' : `history.html?page=${encodeURIComponent(v)}`;
      window.location.href = url;
    });

    const vp = document.getElementById('vp');
    versions.forEach(v => {
      const pg = data.pages.find(p => p.id === v.pageId);
      const item = CMS.el(`
        <div class="version-item">
          <div class="version-time">${new Date(v.timestamp).toLocaleString()}</div>
          <div class="version-body">
            <div class="version-label">${CMS.escape(v.label)} · <span class="muted">${CMS.escape(pg ? pg.title : v.pageId)}</span></div>
            <div class="version-user">by ${CMS.escape(v.user)} · ${(v.data.sections || []).length} sections</div>
          </div>
          <div class="version-actions">
            <button class="btn btn-sm" data-act="diff" data-id="${v.id}">Preview</button>
            ${CMS.can('history.restore') && pg ? `<button class="btn btn-sm btn-primary" data-act="restore" data-id="${v.id}">Restore</button>` : ''}
          </div>
        </div>
      `);
      vp.appendChild(item);
    });

    vp.querySelectorAll('button[data-act]').forEach(b => b.addEventListener('click', () => {
      const id = b.dataset.id;
      if (b.dataset.act === 'restore') restoreSnap(id);
      else if (b.dataset.act === 'diff') previewSnap(id);
    }));
  }

  function restoreSnap(id) {
    if (!CMS.gate('history.restore')) return;
    const data = CMS.load();
    const v = data.versions.find(x => x.id === id);
    if (!v) return;
    CMS.confirmDialog(`Restore page "${(v.data && v.data.title) || v.pageId}" to this snapshot from ${new Date(v.timestamp).toLocaleString()}? Current version will be snapshotted first.`, () => {
      if (CMS.restoreVersion(id)) {
        CMS.toast('Page restored', 'ok');
        render();
      }
    });
  }

  function previewSnap(id) {
    const data = CMS.load();
    const v = data.versions.find(x => x.id === id);
    if (!v) return;
    const sections = (v.data.sections || []).map(s => `
      <div style="padding:10px 12px;background:var(--bg-3);border-radius:4px;margin-bottom:6px;display:flex;justify-content:space-between">
        <div><strong>${CMS.escape(s.name)}</strong> <span class="tiny muted">${s.type}</span></div>
        <div class="tiny muted">${s.visible ? 'visible' : 'hidden'}</div>
      </div>
    `).join('');
    CMS.modal({
      title: `Snapshot — ${new Date(v.timestamp).toLocaleString()}`,
      size: 'lg',
      body: `
        <div class="small muted" style="margin-bottom:12px">By ${CMS.escape(v.user)} · "${CMS.escape(v.label)}"</div>
        <div class="field"><label class="label">Title</label><div>${CMS.escape(v.data.title)}</div></div>
        <div class="field"><label class="label">Status</label><div>${CMS.escape(v.data.status)}</div></div>
        <div class="field"><label class="label">Sections</label>${sections}</div>
      `,
      footer: false
    });
  }

  render();
})();
</script>
</body>
</html>
